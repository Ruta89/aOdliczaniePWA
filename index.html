<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Czasomierz PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <h1>Czasomierz</h1>
        <div id="clockDisplay">00:00:00</div>
        
        <div id="endTimeDisplay" class="end-time">Koniec: --:--:--</div>
        
        <div class="input-group" style="margin-top: 25px;">
            <label for="timeInput">Wprowadź czas (w formacie dziesiętnym, np. 0.5 = 30 min):</label>
            <input type="number" id="timeInput" step="0.01" min="0.01" placeholder="np. 1.25">
        </div>

        <div class="btn-group">
            <button id="startBtn" class="btn primary">Rozpocznij</button>
            <button id="stopBtn" class="btn secondary">Zatrzymaj</button>
            <button id="resetBtn" class="btn secondary">Reset</button>
            <button id="muteBtn" class="btn outline">Wycisz 🔕</button>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
